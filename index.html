<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Price & BE ROAS Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #08080b;
        --bg-elev: #111114;
        --bg-elev-2: #16161a;
        --border: #1f1f24;
        --border-strong: #2a2a31;
        --text: #ededf0;
        --text-dim: #8a8a93;
        --text-faint: #5a5a63;
        --green: #22c55e;
        --green-glow: rgba(34, 197, 94, 0.15);
        --cyan: #06b6d4;
        --cyan-glow: rgba(6, 182, 212, 0.15);
        --amber: #f59e0b;
        --red: #ef4444;
        --violet: #8b5cf6;
      }

      * {
        box-sizing: border-box;
      }

      html, body, #root {
        height: 100%;
        margin: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        font-feature-settings: 'cv11', 'ss01', 'ss03';
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }

      /* Subtle radial gradient backdrop */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 80% 50% at 50% -10%, rgba(34, 197, 94, 0.08), transparent 60%),
          radial-gradient(ellipse 60% 40% at 80% 100%, rgba(6, 182, 212, 0.05), transparent 60%);
        pointer-events: none;
        z-index: 0;
      }

      #root {
        position: relative;
        z-index: 1;
      }

      .mono {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-feature-settings: 'zero', 'ss01';
      }

      /* Input styling */
      .number-input {
        width: 100%;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text);
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 15px;
        font-weight: 500;
        padding: 12px 12px;
        -moz-appearance: textfield;
      }
      .number-input::-webkit-outer-spin-button,
      .number-input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      .input-wrap {
        display: flex;
        align-items: center;
        background: var(--bg-elev-2);
        border-radius: 10px;
        border: 1px solid var(--border);
        transition: all 0.15s ease;
      }
      .input-wrap:hover {
        border-color: var(--border-strong);
      }
      .input-wrap:focus-within {
        border-color: var(--green);
        background: rgba(34, 197, 94, 0.03);
        box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
      }

      .btn {
        font-family: 'Inter', sans-serif;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.02em;
        padding: 8px 14px;
        border-radius: 8px;
        border: 1px solid var(--border-strong);
        background: var(--bg-elev-2);
        color: var(--text);
        cursor: pointer;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .btn:hover {
        background: var(--bg-elev);
        border-color: var(--text-faint);
      }
      .btn-primary {
        background: var(--green);
        color: #000;
        border-color: var(--green);
      }
      .btn-primary:hover {
        background: #16a34a;
        border-color: #16a34a;
      }
      .btn-ghost {
        background: transparent;
        border-color: transparent;
        color: var(--text-dim);
      }
      .btn-ghost:hover {
        background: var(--bg-elev-2);
        color: var(--text);
        border-color: transparent;
      }

      .card {
        background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
        background-color: var(--bg-elev);
        border-radius: 16px;
        border: 1px solid var(--border);
        padding: 24px;
        margin-bottom: 16px;
      }

      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--bg-elev-2);
        border: 1px solid var(--green);
        color: var(--text);
        padding: 10px 18px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 500;
        z-index: 100;
        box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(34, 197, 94, 0.2);
        animation: toastIn 0.2s ease, toastOut 0.2s ease 1.6s forwards;
      }
      @keyframes toastIn {
        from { opacity: 0; transform: translate(-50%, 10px); }
        to { opacity: 1; transform: translate(-50%, 0); }
      }
      @keyframes toastOut {
        to { opacity: 0; transform: translate(-50%, 10px); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
